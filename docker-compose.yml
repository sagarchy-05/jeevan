# Jeevan — full local stack. One command boots everything:
#   cp .env.example .env && docker compose up --build
#
# App services wait for postgres + rabbitmq to be healthy. Host hostnames for the
# inter-service links are pinned here so they work regardless of the .env values
# (which may use localhost for non-Docker local runs).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # web UI

  jeevan-core:
    build: ./jeevan-core
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      MAIL_HOST: mailhog
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  jeevan-notifier:
    build: ./jeevan-notifier
    env_file: .env
    environment:
      RABBITMQ_HOST: rabbitmq
      MAIL_HOST: mailhog
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  jeevan-web:
    build:
      context: ./jeevan-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_DEMO_PACING: ${VITE_DEMO_PACING}
    ports:
      - "5173:80"
    depends_on:
      - jeevan-core

volumes:
  pgdata:
